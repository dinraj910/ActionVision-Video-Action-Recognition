# =============================================================
# nginx.conf – SPA routing + optional API proxy
# =============================================================
# Placed at /etc/nginx/conf.d/default.conf inside the container.
# =============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── API reverse proxy ──────────────────────────────────────────────
    # Routes /predict and /health to the FastAPI backend container.
    # In production, replace 'backend' with the actual hostname/IP.
    location ~ ^/(predict|health) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Large file upload support
        client_max_body_size 110m;
        proxy_read_timeout   120s;
        proxy_send_timeout   120s;
    }

    # ── Static assets (cache aggressively) ────────────────────────────
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback – all other routes serve index.html ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/javascript;
    gzip_min_length 1024;
}
